name: Python Linting

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy pytest

      - name: Run flake8
        run: flake8 . --count --show-source --statistics

      - name: Run black
        run: black --check --diff .

      - name: Run mypy
        run: mypy miwear/ --ignore-missing-imports

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Run log.py for test
        run: ./miwear/log.py ./tests/data/123.tar.gz && ./miwear/log.py ./tests/data/456（1）.tar.gz && ./miwear/log.py ./tests/data/crash_txt.tar.gz

      - name: Run targz.py for test
        run: ./miwear/targz.py --path tests/data

      - name: Run gz.py for test
        run: ./miwear/gz.py --path tests/data

      - name: Run unzip.py for test
        run: ./miwear/unzip.py --path tests/data

      - name: Run check
        run: cat 123.log

      - name: Run md5sum
        run: md5sum -c tests/data/123.md5
