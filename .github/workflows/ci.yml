name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy

      - name: Run flake8
        run: flake8 . --count --show-source --statistics

      - name: Run black
        run: black --check --diff .

      - name: Run mypy
        run: mypy miwear/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    name: Python ${{ matrix.python-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Run log.py for test
        run: ./miwear/log.py ./tests/data/123.tar.gz && ./miwear/log.py ./tests/data/456（1）.tar.gz && ./miwear/log.py ./tests/data/crash_txt.tar.gz

      - name: Run targz.py for test
        run: ./miwear/targz.py --path tests/data

      - name: Run gz.py for test
        run: ./miwear/gz.py --path tests/data

      - name: Run unzip.py for test
        run: ./miwear/unzip.py --path tests/data

      - name: Run md5sum
        run: md5sum -c tests/data/123.md5
